<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SPRC Driver Coaching</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --severity-turquoise: #06B6D4;
            --severity-yellow: #D97706;
            --severity-orange: #EA580C;
            --severity-red: #DC2626;
            --severity-black: #111827;
            --bg-dark: #0F172A;
            --bg-card: #1E293B;
            --text-primary: #F8FAFC;
            --text-secondary: #94A3B8;
            --text-muted: #64748B;
            --border: #334155;
            --success: #10B981;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Loading Screen */
        .loading-screen {
            position: fixed; inset: 0;
            background: var(--bg-dark);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .loading-screen.hidden { opacity: 0; pointer-events: none; }
        .loading-logo { font-size: 2rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
        .loading-sub { color: var(--text-secondary); font-size: 0.9rem; }
        .loading-bar { width: 200px; height: 3px; background: var(--border); border-radius: 3px; margin-top: 2rem; overflow: hidden; }
        .loading-bar-fill { height: 100%; width;: 0; border-radius: 3px; transition: width 0.8s ease; }

        /* App Container */
        .app { position: fixed; inset: 0; display: flex; flex-direction: column; }

        /* Top Bar */
        .top-bar {
            padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            z-index: 10;
        }
        .top-bar-left { display: flex; align-items: center; gap: 10px; }
        .severity-dot { width: 10px; height: 10px; border-radius: 50%; }
        .session-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .card-counter { font-size: 0.85rem; color: var(--text-secondary); font-weight: 600; }

        /* Progress Bar */
        .progress-bar { height: 3px; background: var(--border); }
        .progress-fill { height: 100%; transition: width 0.4s ease; border-radius: 0 3px 3px 0; }

        /* Card Area */
        .card-area {
            flex: 1; overflow-y: auto; overflow-x: hidden;
            padding: 20px 20px 100px 20px;
            -webkit-overflow-scrolling: touch;
        }

        /* Card Content */
        .card { display: none; animation: fadeIn 0.3s ease; }
        .card.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
